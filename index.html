<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 360 VR con A-Frame y Hotspots</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('teleport', {
      schema: {
        target: {type: 'string'},
        showGroup: {type: 'string'},
        hideGroup: {type: 'string'}
      },
      init: function () {
        var el = this.el;
        var data = this.data;
        
        el.addEventListener('click', function () {
          document.querySelector('a-sky').setAttribute('src', data.target);

          document.querySelector(data.hideGroup).setAttribute('visible', 'false');
          document.querySelector(data.hideGroup).setAttribute('scale', '0 0 0');

          document.querySelector(data.showGroup).setAttribute('visible', 'true');
          document.querySelector(data.showGroup).setAttribute('scale', '1 1 1');
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene>
    
    <a-assets>
      <img id="home" src="images/imA.jpg" crossorigin="anonymous">
      <img id="ambiente1" src="images/imB.jpg" crossorigin="anonymous">
      <img id="ambiente2" src="images/imC.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#home" rotation="0 -90 0"></a-sky>

    <a-entity id="group-home" visible="true" scale="1 1 1">
      <a-sphere position="-3 1 -4" radius="0.4" color="#FF5733"
                teleport="target: #ambiente1; hideGroup: #group-home; showGroup: #group-ambiente1">
        <a-text value="Ir a Ambiente 1" align="center" position="0 0.7 0" scale="1.5 1.5 1.5"></a-text>
      </a-sphere>

      <a-sphere position="3 1 -4" radius="0.4" color="#33FF57"
                teleport="target: #ambiente2; hideGroup: #group-home; showGroup: #group-ambiente2">
        <a-text value="Ir a Ambiente 2" align="center" position="0 0.7 0" scale="1.5 1.5 1.5"></a-text>
      </a-sphere>
    </a-entity>

    <a-entity id="group-ambiente1" visible="false" scale="0 0 0">
      <a-sphere position="0 1 -5" radius="0.4" color="#3357FF"
                teleport="target: #home; hideGroup: #group-ambiente1; showGroup: #group-home">
        <a-text value="Volver al Home" align="center" position="0 0.7 0" scale="1.5 1.5 1.5"></a-text>
      </a-sphere>
    </a-entity>

    <a-entity id="group-ambiente2" visible="false" scale="0 0 0">
      <a-sphere position="0 1 -5" radius="0.4" color="#3357FF"
                teleport="target: #home; hideGroup: #group-ambiente2; showGroup: #group-home">
        <a-text value="Volver al Home" align="center" position="0 0.7 0" scale="1.5 1.5 1.5"></a-text>
      </a-sphere>
    </a-entity>

    <a-entity camera look-controls>
      <a-cursor id="cursor"
                animation__click="property: scale; startEvents: click; easing: easeInCubic; from: 0.1 0.1 0.1; to: 1 1 1"
                animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; from: 1 1 1; to: 0.1 0.1 0.1"
                raycaster="objects: a-sphere">
      </a-cursor>
    </a-entity>

  </a-scene>

</body>
</html>
